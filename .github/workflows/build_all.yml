name: Generate Android APK
on: push
jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Master Clean and Recreate
        run: |
          flutter clean
          rm -rf android
          flutter create --platforms=android --project-name=nexus_frontend .
      - name: Build APK
        run: flutter build apk --debug
        
