name: Generate Android APK
on: push
jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Force Update Android Project
        run: |
          rm -rf android
          flutter create . --platforms=android --force
      - name: Build APK
        run: flutter build apk --debug


        
